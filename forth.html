<html lang="en">

		<meta charset="UTF-8" />

			name="viewport"

	</head>
	<body>
		<ul>
			<li><a href="index.html">Home</a></li>
			<li><a href="second.html">Second</a></li>

		<h1>Forth</h1>
		<button style="cursor: pointer">Press me</button>
		<label>Button label<input type="button" /></label>
		<br /><br /><br />
		<form
			action="./submit_page"
			method="get">
			<h2>Subscribe to our newsletter</h2>
			<p>
				<label for="name">Name (required):</label>
				<input
					value="Bob"
					type="text"
					name="name"
					id="name"
					required />
			</p>
			<p>
				<label for="email">Email (required):</label>
				<input
					type="email"
					name="email"
					id="email"
					required />
			</p>
			<p>
				<label for="color">Email (required):</label>
				<input
					type="color"
					name="color"
					id="color"
					required />
			</p>
			<p>
				<button>Sign me up!</button>
			</p>
		</form>
	</body>
	<script>
		const btn = document.querySelector('button');
		btn.addEventListener('click', () => {
			btn.textContent = 'YOU CLICKED ME!! ❤️';
			setTimeout(() => {
				btn.textContent = 'Press me';
			}, 1000);
		});
	</script>
