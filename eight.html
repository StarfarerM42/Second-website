<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<form>
			<ul>
				<li>
					<label for="user">User ID</label
					><input
						type="text"
						id="uder"
						name="user" />
				</li>
				<li>
					<label for="password">Password</label
					><input
						type="password"
						id="password"
						name="password" />
				</li>
				<li><button type="submit">Log in</button></li>
			</ul>
		</form>
		<form>
			<fieldset>
				<legend>Who is your favorite pony?</legend>
				<ul>
					<li>
						<input
							type="radio"
							id="pinkie"
							name="pony"
							value="Pinkie Pie"
							checked />
						<label for="pinkie">Pinkie Pie</label>
					</li>
					<li>
						<input
							type="radio"
							id="rainbow"
							name="pony"
							value="Rainbow Dash" />
						<label for="rainbow">Rainbow Dash</label>
					</li>
					<li>
						<input
							type="radio"
							id="twilight"
							name="pony"
							value="Twilight Sparkle" />
						<label for="twilight">Twilight Sparkle</label>
					</li>
				</ul>
			</fieldset>
			<fieldset>
				<legend>Hotdog preferences</legend>
				<ul>
					<li>
						<input
							type="checkbox"
							id="vegan"
							name="hotdog"
							value="Vegan" />
						<label for="vegan">Vegan</label>
					</li>
					<li>
						<input
							type="checkbox"
							id="onions"
							name="hotdog"
							value="Onions" />
						<label for="onions">Onions</label>
					</li>
					<li>
						<input
							type="checkbox"
							id="carrot"
							name="hotdog"
							value="Carrot" />
						<label for="carrot">Carrot</label>
					</li>
				</ul>
			</fieldset>
			<button>Submit</button>
		</form>
	</body>
</html>
