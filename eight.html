<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<ul>
			<li><a href="index.html">Home</a></li>
			<li><a href="second.html">Second</a></li>
			<li><a href="third.html">Third</a></li>
			<li><a href="forth.html">Forth</a></li>
			<li><a href="fifth.html">Fifth</a></li>
			<li><a href="six.html">Six</a></li>
			<li><a href="seven.html">Seven</a></li>
			<li>Forms</li>
			<li><a href="nine.html">Nine</a></li>
			<li><a href="ten.html">Ten</a></li>
		</ul>
		<h1>Forms</h1>
		<h2>Form 1</h2>
		<form>
			<ul>
				<li>
					<label for="user">User ID</label
					><input
						type="text"
						id="uder"
						name="user" />
				</li>
				<li>
					<label for="password">Password</label
					><input
						type="password"
						id="password"
						name="password" />
				</li>
				<li><button type="submit">Log in</button></li>
			</ul>
		</form>
		<h2>Form 2</h2>
		<form>
			<fieldset>
				<legend>Who is your favorite pony?</legend>
				<ul>
					<li>
						<input
							type="radio"
							id="pinkie"
							name="pony"
							value="Pinkie Pie"
							checked />
						<label for="pinkie">Pinkie Pie</label>
					</li>
					<li>
						<input
							type="radio"
							id="rainbow"
							name="pony"
							value="Rainbow Dash" />
						<label for="rainbow">Rainbow Dash</label>
					</li>
					<li>
						<input
							type="radio"
							id="twilight"
							name="pony"
							value="Twilight Sparkle" />
						<label for="twilight">Twilight Sparkle</label>
					</li>
				</ul>
			</fieldset>
			<fieldset>
				<legend>Hotdog preferences</legend>
				<ul>
					<li>
						<input
							type="checkbox"
							id="vegan"
							name="hotdog"
							value="Vegan" />
						<label for="vegan">Vegan</label>
					</li>
					<li>
						<input
							type="checkbox"
							id="onions"
							name="hotdog"
							value="Onions" />
						<label for="onions">Onions</label>
					</li>
					<li>
						<input
							type="checkbox"
							id="carrot"
							name="hotdog"
							value="Carrot" />
						<label for="carrot">Carrot</label>
					</li>
				</ul>
			</fieldset>
			<button>Submit</button>
		</form>
		<h2>Form 3</h2>
		<form>
			<h2>Edit your preferences</h2>
			<ul>
				<li>
					<label for="email">Email</label>
					<input
						type="email"
						id="email"
						name="email"
						required />
				</li>
				<li>
					<label for="website">Website</label>
					<input
						type="url"
						id="website"
						name="website" />
				</li>
				<li>
					<label for="phone">Phone number</label>
					<input
						type="tel"
						id="phone"
						name="phone"
						required />
				</li>
				<li>
					<label for="fave-color">Favorite color</label>
					<input
						type="color"
						id="fave-color"
						name="fave-color"
						required />
				</li>
				<li>
					<button>Update preferences</button>
				</li>
			</ul>
		</form>
		<h2>Form 4</h2>
		<form>
			<ul>
				<li>
					<label for="food">Pick your favorite food:</label>
					<select
						name="food"
						id="food">
						<optgroup label="mains">
							<option value="salad">Salad</option>
							<option value="curry">Curry</option>
							<option value="pizza">Pizza</option>
							<option value="fajitas">Fajitas</option>
						</optgroup>
						<optgroup label="snacks">
							<option value="biscuits">Biscuits</option>
							<option value="crisps">Crisps</option>
							<option value="fruit">Fruit</option>
							<option value="breadsticks">Breadsticks</option>
						</optgroup>
					</select>
				</li>
				<li>
					<button>Submit choice</button>
				</li>
			</ul>
		</form>
		<h2>Form 5</h2>
		<form>
			<fieldset>
				<legend>Personal details</legend>
				<ul>
					<li>
						<label for="name">Name:</label>
						<input
							type="text"
							id="name"
							name="name" />
					</li>
					<li>
						<label for="age">Age:</label>
						<input
							type="number"
							id="age"
							name="age" />
					</li>
				</ul>
			</fieldset>

			<fieldset>
				<legend>Comment information</legend>
				<ul>
					<li>
						<label for="comment">Comment:</label>

						<input
							type="text"
							id="comment"
							name="comment" />
					</li>
					<li>
						<label for="email"
							>Email (include if you want a reply):</label
						><input
							type="email"
							id="email"
							name="email" />
					</li>
				</ul>
			</fieldset>

			<button>Send</button>
		</form>
		<h2>Form 6</h2>
		<form>
			<h2>Enter your support query</h2>
			<ul>
				<li>
					<label for="uname">User name:</label>
					<input
						type="text"
						name="uname"
						id="uname"
						required
						minlength="5"
						maxlength="20" />
				</li>
				<li>
					<label for="email">Email address:</label>
					<input
						type="email"
						name="email"
						id="email"
						required />
				</li>
				<li>
					<label for="phone">Phone number:</label>
					<input
						type="tel"
						name="phone"
						id="phone"
						maxlength="15"
						required />
				</li>
				<li>
					<label for="comment">Comment:</label>
					<textarea
						name="comment"
						id="comment"
						maxlength="200"
						required>
					</textarea>
				</li>
				<li>
					<button type="submit">Submit comment</button>
				</li>
			</ul>
		</form>
	</body>
</html>
